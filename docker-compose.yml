version: '3.8'

services:
  notion-opus:
    build:
      context: .
      dockerfile: Dockerfile
    image: notion-ai-wrapper:latest
    container_name: notion_opus
    restart: unless-stopped

    # 端口映射（宿主机端口:容器端口）
    ports:
      - "${HOST_PORT:-8000}:8000"

    # 环境变量配置
    env_file:
      - .env
    environment:
      # 覆盖 .env 中的数据库路径，确保指向容器内的路径
      - DB_PATH=/app/data/conversations.db
      # Python 配置
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai

    # 数据持久化
    volumes:
      # 持久化数据库
      - ./data:/app/data
      # 可选：挂载日志目录
      - ./logs:/app/logs

    # 资源限制（防止容器占满服务器资源）
    deploy:
      resources:
        limits:
          cpus: '2.0'      # 最多使用 2 个 CPU 核心
          memory: 2G       # 最多使用 2GB 内存
        reservations:
          cpus: '0.5'      # 保留 0.5 个 CPU 核心
          memory: 512M     # 保留 512MB 内存

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s    # 每 30 秒检查一次
      timeout: 10s     # 超时时间 10 秒
      retries: 3       # 失败 3 次后标记为不健康
      start_period: 10s # 容器启动后 10 秒才开始检查

    # 日志配置（防止日志占满磁盘）
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # 单个日志文件最大 10MB
        max-file: "3"     # 最多保留 3 个日志文件

    # 网络配置（使用自定义网络）
    networks:
      - notion-network

# 自定义网络（更好的网络隔离和 DNS 解析）
networks:
  notion-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

