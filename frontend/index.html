<!DOCTYPE html>
<html lang="zh-CN" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude - Notion Opus Wrapper</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Marked.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- DOMPurify (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>

    <!-- Highlight.js (CDN) for Markdown Code Blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Google Fonts: Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <!-- Tailwind Configuration & Custom Styles -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Light mode signature flesh/cream tones
                        claudeBg: '#fcfbf8',
                        claudeSidebar: '#f6f4f0',
                        claudeText: '#2d2d2d',
                        claudeInput: '#ffffff',
                        claudeUserMsg: '#f2f0eb',

                        // Dark mode overrides
                        darkBg: '#1e1e1e',
                        darkSidebar: '#252525',
                        darkText: '#e5e5e5',
                        darkInput: '#2d2d2d',
                        darkUserMsg: '#383838',

                        // Action colors
                        accent: '#da7756', // The orange-ish star color
                        accentHover: '#c56546',
                    },
                    fontFamily: {
                        sans: ['"Lora"', 'Georgia', 'serif'],
                        serif: ['"Lora"', 'Georgia', 'serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        /* Base global transitions */
        body {
            font-family: 'Lora', Georgia, serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Subtle Background Texture (Dark Mode) */
        html.dark body {
            background: radial-gradient(ellipse at 50% 30%, #222018 0%, #161614 60%, #111110 100%);
            background-attachment: fixed;
        }

        /* Star Icon Breathing Animation */
        @keyframes breathe {

            0%,
            100% {
                opacity: 0.7;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.08);
            }
        }

        .star-breathe {
            animation: breathe 3s ease-in-out infinite;
        }

        /* AI Message Star Animations */
        @keyframes starBreathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.75;
            }

            50% {
                transform: scale(1.18);
                opacity: 1;
            }
        }

        .star-generating {
            animation: starBreathe 1.6s ease-in-out infinite;
        }

        @keyframes starClick {
            0% {
                transform: scale(1);
            }

            30% {
                transform: scale(0.7);
            }

            100% {
                transform: scale(1);
            }
        }

        .message-star-container {
            position: absolute;
            bottom: -28px;
            left: 0;
            width: 28px;
            height: 28px;
            pointer-events: auto;
        }

        .message-star-container>svg {
            width: 28px;
            height: 28px;
        }

        .star-tooltip {
            font-family: 'Lora', Georgia, serif;
            font-style: italic;
            font-size: 11px;
            background: transparent;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        html.dark .star-tooltip {
            color: rgba(255, 255, 255, 0.5);
        }

        html:not(.dark) .star-tooltip {
            color: rgba(0, 0, 0, 0.5);
        }

        .message-star-container:hover .star-tooltip {
            opacity: 1;
        }

        /* Claude Style Custom Select */
        #customModelDropdown {
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.15s ease, transform 0.15s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            font-family: 'Lora', Georgia, serif;
        }

        #customModelDropdown.open {
            pointer-events: auto;
            opacity: 1;
            transform: translateY(0);
        }

        /* Welcome Title Typography */
        .welcome-title {
            font-family: 'Lora', serif;
            font-size: clamp(1.8rem, 3vw, 2.4rem);
            letter-spacing: 0.01em;
        }

        /* Input Box Polish */
        .chat-input-wrapper {
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
            border: 1px solid rgba(196, 120, 80, 0.25) !important;
        }

        .chat-input-wrapper:focus-within {
            box-shadow: 0 0 0 1.5px rgba(196, 120, 80, 0.4) !important;
            border-color: rgba(196, 120, 80, 0.4) !important;
        }

        /* Custom placeholder color */
        html.dark #chatInput::placeholder {
            color: rgba(255, 255, 255, 0.3) !important;
        }

        html:not(.dark) #chatInput::placeholder {
            color: rgba(0, 0, 0, 0.3) !important;
        }

        .memory-banner {
            border-left: 3px solid #da7756;
            background: #f2f0eb;
            color: #2d2d2d;
        }

        html.dark .memory-banner {
            background: #383838;
            color: #e5e5e5;
        }

        .memory-banner-icon {
            color: #da7756;
        }

        .memory-banner-close {
            color: inherit;
            opacity: 0.72;
        }

        .memory-banner-close:hover {
            opacity: 1;
        }

        /* Hide scrollbars for cleaner look like native apps */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* Markdown Content Styling */
        .markdown-body {
            font-size: 1rem;
            line-height: 1.6;
        }

        .markdown-body p {
            margin-bottom: 1em;
        }

        .markdown-body pre {
            background-color: #1a1a1a !important;
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            margin: 1em 0;
            position: relative;
        }

        /* Per-code-block copy button */
        .code-copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            background: rgba(255, 255, 255, 0.07);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 0.35rem;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            font-family: inherit;
        }

        .markdown-body pre:hover .code-copy-btn {
            opacity: 1;
        }

        .code-copy-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
        }

        .markdown-body code {
            font-family: Consolas, Monaco, "Courier New", monospace;
            font-size: 0.9em;
        }

        /* Inline code */
        .markdown-body p code,
        .markdown-body li code {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 0.2em 0.4em;
            border-radius: 0.25rem;
            color: #d15050;
        }

        html.dark .markdown-body p code,
        html.dark .markdown-body li code {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ff8c8c;
        }

        .markdown-body ul {
            list-style-type: disc;
            padding-left: 2em;
            margin-bottom: 1em;
        }

        .markdown-body ol {
            list-style-type: decimal;
            padding-left: 2em;
            margin-bottom: 1em;
        }

        /* Search metadata block */
        .search-sources,
        .thinking-sources {
            margin-bottom: 0.6rem;
            padding: 0.45rem 0.6rem;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 0.6rem;
            background: rgba(0, 0, 0, 0.03);
            color: #666;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        html.dark .search-sources,
        html.dark .thinking-sources {
            border-color: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: #bdbdbd;
        }

        .search-toggle,
        .thinking-toggle {
            width: 100%;
            background: transparent;
            border: 0;
            color: inherit;
            text-align: left;
            font-size: inherit;
            cursor: pointer;
            padding: 0;
        }

        .search-details,
        .thinking-details {
            margin-top: 0.45rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .search-links {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .search-source-link {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 2px;
            opacity: 0.95;
        }

        .search-source-link:hover {
            opacity: 0.75;
        }

        .search-empty {
            opacity: 0.75;
        }

        .thinking-markdown {
            font-size: inherit;
            line-height: 1.45;
        }

        .thinking-markdown p {
            margin-bottom: 0.55em;
        }

        .thinking-markdown pre {
            margin: 0.45rem 0;
        }

        /* Thinking animation dots */
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: currentColor;
            border-radius: 50%;
            margin-right: 4px;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typing {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

                    <path d="M18 6L6 18M6 6l12 12"></path>

        </div>

        <!-- New Chat Button -->
        <div class="px-3 pb-4">

            </button>
        </div>

    <!-- MAIN CHAT AREA -->

        <!-- Main Area Header -->
        <header

        <!-- Chat Stream Render Area -->
        <div id="chatContainer"
            class="flex-1 overflow-y-auto w-full max-w-3xl mx-auto px-4 sm:px-6 pb-36 pt-4 flex flex-col gap-6 relative z-10 scroll-smooth">
            <!-- Messages inserted here dynamically -->
        </div>

        <!-- Sticky Input Area -->
        <div class="absolute bottom-0 left-0 right-0 p-4 sm:px-6 z-20 pointer-events-none">
            <!-- Gradient fading helper mask -->
            <div
                class="absolute inset-x-0 -top-10 h-10 bg-gradient-to-t from-claudeBg dark:from-darkBg to-transparent z-[-1]">
            </div>
            <div class="absolute inset-0 bg-claudeBg dark:bg-darkBg z-[-1]"></div>

            <div class="max-w-3xl mx-auto pointer-events-auto">
                <div
                    class="relative bg-white dark:bg-darkInput w-full shadow-[0_0_15px_rgba(0,0,0,0.05)] dark:shadow-none rounded-2xl chat-input-wrapper">

                    <textarea id="chatInput" rows="1" placeholder="How can I help you today?"
                        class="w-full bg-transparent resize-none outline-none max-h-40 min-h-[56px] py-4 pl-4 pr-14 text-[15px] placeholder:text-gray-400 dark:placeholder:text-gray-500 overflow-y-auto disabled:opacity-50"
                        style="height: 56px;"></textarea>

                    <button id="sendBtn" title="Send (Enter)"
                        class="absolute right-3 bottom-[14px] bg-accent/10 text-accent hover:bg-accent hover:text-white p-1.5 rounded-lg transition-colors disabled:opacity-40 disabled:hover:bg-accent/10 disabled:hover:text-accent disabled:cursor-not-allowed">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                    <!-- Custom Claude Model Dropdown -->
                    <div class="absolute right-[48px] bottom-[14px]">
                        <button id="modelTriggerBtn" type="button"
                            class="flex items-center gap-1.5 text-[13px] italic border border-black/10 dark:border-white/10 dark:bg-white/5 dark:text-white/75 bg-black/5 text-black/75 px-2.5 py-1.5 rounded-lg hover:bg-black/10 dark:hover:bg-white/10 transition-colors">
                            <span id="modelTriggerText">Claude Sonnet 4.6</span>
                            <span class="text-[10px] mt-0.5">∨</span>
                        </button>

                        <div id="customModelDropdown"
                            class="absolute bottom-full right-0 mb-3 w-[240px] bg-white dark:bg-[#2a2825] border border-black/10 dark:border-white/10 rounded-xl p-2 z-50 overflow-hidden flex flex-col">
                            <!-- Level 1 -->
                            <div id="dropdownLevel1" class="flex flex-col w-full">
                                <button type="button"
                                    class="w-full text-left p-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 flex items-center justify-between group transition-colors">
                                    <div class="flex flex-col gap-0.5 pt-0.5">
                                        <span class="text-sm font-medium">Claude Sonnet 4.6</span>
                                        <span class="text-xs text-black/50 dark:text-white/50">Most efficient for
                                            everyday tasks</span>
                                    </div>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6"
                                        stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </button>
                                <div class="h-[1px] w-full bg-black/5 dark:bg-white/5 my-1.5"></div>

                                    class="w-full text-left p-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 flex items-center justify-between text-sm transition-colors text-black/80 dark:text-white/80">

                                    <span class="text-black/40 dark:text-white/40">&gt;</span>

                            <!-- Level 2 -->
                            <div id="dropdownLevel2" class="hidden flex-col w-full">
                                <button id="backToLevel1Btn" type="button"
                                    class="w-full text-left p-2 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 text-sm mb-1 text-black/60 dark:text-white/60 flex items-center gap-2 transition-colors">
                                    <span>&lt; Back</span>
                                </button>
                                <div
                                    class="px-2 pb-1.5 pt-1 text-[11px] font-medium text-black/40 dark:text-white/40 uppercase tracking-wider">
                                    Start a new chat</div>

                    Shift + Enter for new line. Powered by local Notion API.

    </main>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal"
        class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white dark:bg-[#2a2a2a] w-full max-w-md rounded-xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200"
            id="settingsModalContent">
            <div class="p-6">
                <h3 class="text-xl font-serif font-medium mb-4">API Settings</h3>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Base URL</label>
                        <input type="text" id="baseUrlInput"
                            class="w-full bg-gray-50 dark:bg-[#1f1f1f] border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-accent/50 outline-none transition-shadow"
                            placeholder="http://localhost:8000">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">API Key</label>
                        <input type="password" id="apiKeyInput"
                            class="w-full bg-gray-50 dark:bg-[#1f1f1f] border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-accent/50 outline-none transition-shadow"
                            placeholder="Optional if not set on server">
                    </div>
                </div>

                <div class="mt-8 flex justify-end gap-3">
                    <button id="cancelSettingsBtn"
                        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Cancel</button>
                    <button id="saveSettingsBtn"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-black text-white dark:bg-white dark:text-black hover:opacity-90 transition-opacity">Save
                        changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // --- 1. State Management ---
        const API_KEY_STORAGE_KEY = 'claude_api_key';

        function loadStoredApiKey() {
            const apiKey = localStorage.getItem(API_KEY_STORAGE_KEY) || sessionStorage.getItem(API_KEY_STORAGE_KEY) || '';
            return apiKey;
        }

        function persistApiKey(apiKey) {
            if (apiKey) {
                localStorage.setItem(API_KEY_STORAGE_KEY, apiKey);
                sessionStorage.setItem(API_KEY_STORAGE_KEY, apiKey);
            } else {
                localStorage.removeItem(API_KEY_STORAGE_KEY);
                sessionStorage.removeItem(API_KEY_STORAGE_KEY);
            }
        }

        function renderMarkdownToSafeHtml(markdown) {
            const renderedHtml = marked.parse(markdown || '');
            return DOMPurify.sanitize(renderedHtml, {
                USE_PROFILES: { html: true },
                ADD_ATTR: ['target', 'rel']
            });
        }

        function setSafeMarkdown(container, markdown) {
            container.innerHTML = renderMarkdownToSafeHtml(markdown);
        }

        const STATE = {
            baseUrl: localStorage.getItem('claude_base_url') || window.location.origin,
            apiKey: loadStoredApiKey(),
            theme: localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
            chats: JSON.parse(localStorage.getItem('claude_chats')) || [], // [{id, title, messages: [{role, content}]}]
            currentChatId: null,
            isGenerating: false,
            controller: null, // For aborting fetch
            modelDisplayNames: {}
        };
        let memoryDegradedNotified = false;

        // DOM Elements
        const DOM = {
            html: document.documentElement,
            themeToggleBtn: document.getElementById('themeToggleBtn'),
            sunIcon: document.getElementById('sunIcon'),
            moonIcon: document.getElementById('moonIcon'),

            sidebar: document.getElementById('sidebar'),
            mobileBackdrop: document.getElementById('mobileBackdrop'),
            openSidebarBtn: document.getElementById('openSidebarBtn'),
            closeSidebarBtn: document.getElementById('closeSidebarBtn'),

            newChatBtn: document.getElementById('newChatBtn'),
            chatList: document.getElementById('chatList'),

            chatContainer: document.getElementById('chatContainer'),
            memoryBanner: document.getElementById('memoryBanner'),
            memoryBannerClose: document.getElementById('memoryBannerClose'),
            welcomeScreen: document.getElementById('welcomeScreen'),
            chatInput: document.getElementById('chatInput'),
            sendBtn: document.getElementById('sendBtn'),
            headerTitle: document.getElementById('headerTitle'),

            settingsBtn: document.getElementById('settingsBtn'),
            settingsModal: document.getElementById('settingsModal'),
            settingsModalContent: document.getElementById('settingsModalContent'),
            baseUrlInput: document.getElementById('baseUrlInput'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveSettingsBtn: document.getElementById('saveSettingsBtn'),
            cancelSettingsBtn: document.getElementById('cancelSettingsBtn'),

            modelTriggerBtn: document.getElementById('modelTriggerBtn'),
            customModelDropdown: document.getElementById('customModelDropdown'),
            dropdownLevel1: document.getElementById('dropdownLevel1'),
            dropdownLevel2: document.getElementById('dropdownLevel2'),
            moreModelsBtn: document.getElementById('moreModelsBtn'),
            backToLevel1Btn: document.getElementById('backToLevel1Btn'),
            level2List: document.getElementById('level2List'),
            modelTriggerText: document.getElementById('modelTriggerText')
        };

        const LOCAL_MODELS = [
            { id: "claude-opus4.6", label: "Claude Opus 4.6" },
            { id: "gemini-3.1pro", label: "Gemini 3.1 Pro" },
            { id: "gpt-5.2", label: "GPT-5.2" }
        ];
        let currentSelectedModel = "claude-sonnet4.6";
        let currentSelectedModelLabel = "Claude Sonnet 4.6";

        // --- 2. Initialization ---
        function init() {
            applyTheme(STATE.theme);
            loadModels();
            renderChatList();
            updateWelcomeGreeting();

            // Event Listeners
            DOM.themeToggleBtn.addEventListener('click', toggleTheme);
            DOM.newChatBtn.addEventListener('click', startNewChat);

            // Sidebar Mobile Toggle
            DOM.openSidebarBtn.addEventListener('click', () => toggleSidebar(true));
            DOM.closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));
            DOM.mobileBackdrop.addEventListener('click', () => toggleSidebar(false));

            // Input interactions
            DOM.chatInput.addEventListener('input', autoResizeInput);
            DOM.chatInput.addEventListener('keydown', handleInputKeydown);
            DOM.sendBtn.addEventListener('click', handleSend);
            DOM.memoryBannerClose.addEventListener('click', () => {
                DOM.memoryBanner.classList.add('hidden');
            });

            // Settings interactions
            DOM.settingsBtn.addEventListener('click', openSettings);
            DOM.cancelSettingsBtn.addEventListener('click', closeSettings);
            DOM.saveSettingsBtn.addEventListener('click', saveSettings);

            // Custom Dropdown Interactions
            DOM.modelTriggerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleDropdown();
            });

            document.addEventListener('click', (e) => {
                if (!DOM.customModelDropdown.contains(e.target) && e.target !== DOM.modelTriggerBtn) {
                    DOM.customModelDropdown.classList.remove('open');
                    // reset view
                    setTimeout(() => {
                        DOM.dropdownLevel1.classList.remove('hidden');
                        DOM.dropdownLevel1.classList.add('flex');
                        DOM.dropdownLevel2.classList.remove('flex');
                        DOM.dropdownLevel2.classList.add('hidden');
                    }, 150);
                }
            });

            DOM.moreModelsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                DOM.dropdownLevel1.classList.add('hidden');
                DOM.dropdownLevel1.classList.remove('flex');
                DOM.dropdownLevel2.classList.remove('hidden');
                DOM.dropdownLevel2.classList.add('flex');
            });

            DOM.backToLevel1Btn.addEventListener('click', (e) => {
                e.stopPropagation();
                DOM.dropdownLevel2.classList.add('hidden');
                DOM.dropdownLevel2.classList.remove('flex');
                DOM.dropdownLevel1.classList.remove('hidden');
                DOM.dropdownLevel1.classList.add('flex');
            });

            populateLevel2Models();

            // New chat on load if nothing selected
            if (!STATE.currentChatId) {
                startNewChat();
            }
        }

        // --- 3. UI Interactions ---
        function toggleTheme() {
            STATE.theme = STATE.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', STATE.theme);
            applyTheme(STATE.theme);
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                DOM.html.classList.add('dark');
                DOM.sunIcon.classList.remove('hidden');
                DOM.moonIcon.classList.add('hidden');
            } else {
                DOM.html.classList.remove('dark');
                DOM.sunIcon.classList.add('hidden');
                DOM.moonIcon.classList.remove('hidden');
            }
        }

        function toggleSidebar(show) {
            if (show) {
                DOM.sidebar.classList.remove('-translate-x-full');
                DOM.mobileBackdrop.classList.remove('hidden');
                setTimeout(() => DOM.mobileBackdrop.classList.add('opacity-100'), 10);
            } else {
                DOM.sidebar.classList.add('-translate-x-full');
                DOM.mobileBackdrop.classList.remove('opacity-100');
                setTimeout(() => DOM.mobileBackdrop.classList.add('hidden'), 300);
            }
        }

        function notifyMemoryDegradedOnce() {
            if (memoryDegradedNotified) return;
            memoryDegradedNotified = true;
            DOM.memoryBanner.classList.remove('hidden');
        }

        function autoResizeInput() {
            const el = DOM.chatInput;
            el.style.height = '56px'; // Reset
            const scrollHeight = el.scrollHeight;
            // Max height approx 6 lines (144px)
            el.style.height = Math.min(scrollHeight, 144) + 'px';
        }

        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        }

        // --- 4. Settings Management ---
        function openSettings() {
            DOM.baseUrlInput.value = STATE.baseUrl;
            DOM.apiKeyInput.value = STATE.apiKey;

            DOM.settingsModal.classList.remove('pointer-events-none');
            DOM.settingsModal.classList.add('opacity-100');
            DOM.settingsModalContent.classList.remove('scale-95');
            DOM.settingsModalContent.classList.add('scale-100');
        }

        function closeSettings() {
            DOM.settingsModal.classList.remove('opacity-100');
            DOM.settingsModalContent.classList.remove('scale-100');
            DOM.settingsModalContent.classList.add('scale-95');
            setTimeout(() => {
                DOM.settingsModal.classList.add('pointer-events-none');
            }, 200);
        }

        function saveSettings() {
            STATE.baseUrl = DOM.baseUrlInput.value.trim().replace(/\/$/, "");
            STATE.apiKey = DOM.apiKeyInput.value.trim();
            localStorage.setItem('claude_base_url', STATE.baseUrl);
            persistApiKey(STATE.apiKey);
            closeSettings();
            loadModels(); // Refresh models with new config
        }

        // --- 5. Data Fetching & Model ---
        function toggleDropdown() {
            DOM.customModelDropdown.classList.toggle('open');
        }

        function handleModelSelect(id, label) {
            currentSelectedModel = id;
            currentSelectedModelLabel = label;
            DOM.modelTriggerText.textContent = label;
            DOM.customModelDropdown.classList.remove('open');

            // reset view for next time
            setTimeout(() => {
                DOM.dropdownLevel1.classList.remove('hidden');
                DOM.dropdownLevel1.classList.add('flex');
                DOM.dropdownLevel2.classList.remove('flex');
                DOM.dropdownLevel2.classList.add('hidden');
            }, 150);
        }

        function populateLevel2Models() {
            DOM.level2List.innerHTML = '';
            LOCAL_MODELS.forEach(model => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'w-full text-left p-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 text-sm transition-colors';
                btn.textContent = model.label;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    handleModelSelect(model.id, model.label);
                };
                DOM.level2List.appendChild(btn);
            });
            // Primary Model is managed implicitly in level 1 HTML
            DOM.dropdownLevel1.firstElementChild.onclick = (e) => {
                e.stopPropagation();
                handleModelSelect("claude-sonnet4.6", "Claude Sonnet 4.6");
            }
        }

        async function loadModels() {
            // Models logic replaced by custom UI implementation task 2.
            STATE.modelDisplayNames = {
                "claude-sonnet4.6": "Claude Sonnet 4.6",
                "claude-opus4.6": "Claude Opus 4.6",
                "gemini-3.1pro": "Gemini 3.1 Pro",
                "gpt-5.2": "GPT-5.2"
            };
        }

        function getModelDisplayName(modelId) {
            return STATE.modelDisplayNames[modelId] || modelId;
        }

        // --- 6. Chat Logic Management ---
        function saveChats() {
            localStorage.setItem('claude_chats', JSON.stringify(STATE.chats));
        }

        function startNewChat() {
            if (STATE.isGenerating) return;
            STATE.currentChatId = Date.now().toString();
            DOM.headerTitle.classList.add('opacity-0');
            DOM.chatContainer.innerHTML = '';
            DOM.chatInput.value = '';
            autoResizeInput();
            DOM.welcomeScreen.classList.remove('hidden');

            // Ensure sidebar closes on mobile
            if (window.innerWidth < 768) toggleSidebar(false);
            DOM.chatInput.focus();
        }

        function selectChat(id) {
            if (STATE.isGenerating) return;
            const chat = STATE.chats.find(c => c.id === id);
            if (!chat) return;

            STATE.currentChatId = id;
            DOM.welcomeScreen.classList.add('hidden');
            DOM.chatContainer.innerHTML = '';

            // Set header title
            DOM.headerTitle.textContent = chat.title;
            DOM.headerTitle.classList.remove('opacity-0');

            chat.messages.forEach(msg => {
                appendMessageToDOM(msg.role, msg.content, true);
            });

            if (window.innerWidth < 768) toggleSidebar(false);
            scrollToBottom();
        }

        async function deleteChat(e, id) {
            e.stopPropagation(); // Prevent selectChat
            if (STATE.isGenerating) return;

            const chat = STATE.chats.find(c => c.id === id);
            if (!chat) return;

            try {
                if (chat.conversationId) {
                    const response = await fetch(
                        `${STATE.baseUrl}/v1/conversations/${encodeURIComponent(chat.conversationId)}`,
                        {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${STATE.apiKey}`,
                                'X-Client-Type': 'Web'
                            }
                        }
                    );

                    if (!response.ok && response.status !== 404) {
                        console.error('Delete conversation failed:', response.status);
                        return;
                    }
                }
            } catch (err) {
                console.error('Delete conversation request failed:', err);
                return;
            }

            STATE.chats = STATE.chats.filter(c => c.id !== id);
            saveChats();
            renderChatList();
            if (STATE.currentChatId === id) {
                startNewChat();
            }
        }

        function renderChatList() {
            // Remove all existing chat items except the header
            const items = DOM.chatList.querySelectorAll('.chat-item');
            items.forEach(i => i.remove());

            STATE.chats.sort((a, b) => b.id - a.id).forEach(chat => {
                const btn = document.createElement('div');
                btn.className = `chat-item group flex items-center justify-between p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg cursor-pointer transition-colors ${chat.id === STATE.currentChatId ? 'bg-black/5 dark:bg-white/5' : ''}`;
                btn.onclick = () => selectChat(chat.id);

                const titleSpan = document.createElement('span');
                titleSpan.className = 'text-sm font-medium truncate flex-1';
                titleSpan.textContent = chat.title;

                const delBtn = document.createElement('button');
                delBtn.className = 'opacity-0 group-hover:opacity-100 p-1 text-gray-400 hover:text-red-500 rounded transition-opacity';
                delBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>';
                delBtn.onclick = (e) => deleteChat(e, chat.id);

                btn.appendChild(titleSpan);
                btn.appendChild(delBtn);
                DOM.chatList.appendChild(btn);
            });
        }

        // --- 7. Message Formatting & Streaming ---
        function scrollToBottom() {
            DOM.chatContainer.scrollTo({ top: DOM.chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function createMessageElement(role, modelDisplayName = 'Assistant') {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full mb-4 ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            if (role === 'assistant') {
                wrapper.classList.add('items-end', 'gap-3', 'relative', 'pb-[40px]');

                const starContainer = document.createElement('div');
                starContainer.className = 'message-star-container relative flex-shrink-0 opacity-0 transition-opacity duration-300';
                setTimeout(() => starContainer.classList.remove('opacity-0'), 50);

                starContainer.innerHTML = `
                    <div class="star-tooltip absolute bottom-full mb-2 left-1/2 -translate-x-1/2 whitespace-nowrap">
                        ${modelDisplayName}
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28" class="text-accent message-star cursor-pointer star-generating" style="fill: currentColor;">
                        <path d="m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l1.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l1.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l1.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9.4-7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2.2.2-3 1-1 8-5.5Z"/>
                    </svg>
                `;

                const svg = starContainer.querySelector('svg');
                svg.addEventListener('click', () => {
                    svg.classList.remove('star-click-anim');
                    void svg.offsetWidth;
                    svg.classList.add('star-click-anim');
                });

                wrapper.appendChild(starContainer);
                wrapper.starIconRef = svg;
            }

            const bubble = document.createElement('div');
            if (role === 'user') {
                bubble.className = 'max-w-[85%] bg-claudeUserMsg dark:bg-darkUserMsg text-claudeText dark:text-darkText px-4 py-3 rounded-2xl rounded-tr-sm text-[15px] whitespace-pre-wrap leading-relaxed';
            } else {
                // AI bubble has no explicit background, spreads wide, markdown formatted
                bubble.className = 'w-full max-w-full text-claudeText dark:text-darkText px-2 py-1 text-[15px] relative group overflow-hidden';
            }

            wrapper.appendChild(bubble);
            return { wrapper, bubble };
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalSvg = btn.innerHTML;
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                setTimeout(() => btn.innerHTML = originalSvg, 2000);
            });
        }

        function addCodeBlockCopyButtons(container) {
            container.querySelectorAll('pre').forEach(pre => {
                // Avoid adding duplicate buttons
                if (pre.querySelector('.code-copy-btn')) return;
                const code = pre.querySelector('code');
                if (!code) return;
                const btn = document.createElement('button');
                btn.className = 'code-copy-btn';
                btn.textContent = 'Copy';
                btn.onclick = () => {
                    navigator.clipboard.writeText(code.innerText).then(() => {
                        btn.textContent = 'Copied!';
                        setTimeout(() => btn.textContent = 'Copy', 2000);
                    });
                };
                pre.appendChild(btn);
            });
        }

        function normalizeSearchPayload(payload) {
            const normalized = { queries: [], sources: [] };
            if (!payload || typeof payload !== 'object') return normalized;

            if (Array.isArray(payload.queries)) {
                payload.queries.forEach(q => {
                    if (typeof q === 'string' && q.trim()) normalized.queries.push(q.trim());
                });
            }

            const sourceCandidates = [];
            if (Array.isArray(payload.sources)) sourceCandidates.push(...payload.sources);
            if (Array.isArray(payload.citations)) sourceCandidates.push(...payload.citations);

            sourceCandidates.forEach(src => {
                if (typeof src === 'string' && src.trim()) {
                    normalized.sources.push({ title: src.trim(), url: src.trim(), snippet: '' });
                    return;
                }
                if (!src || typeof src !== 'object') return;

                const title = String(src.title || src.name || src.sourceTitle || src.url || src.href || '').trim();
                const url = String(src.url || src.href || src.link || '').trim();
                const snippet = String(src.snippet || src.summary || src.description || '').trim();

                if (!title && !url) return;
                normalized.sources.push({
                    title: title || url,
                    url,
                    snippet
                });
            });

            return normalized;
        }

        function mergeSearchState(target, payload) {
            const normalized = normalizeSearchPayload(payload);

            normalized.queries.forEach(query => {
                if (!target.queries.includes(query)) target.queries.push(query);
            });

            normalized.sources.forEach(source => {
                const exists = target.sources.some(existing =>
                    existing.title === source.title && existing.url === source.url
                );
                if (!exists) target.sources.push(source);
            });
        }

        function updateSearchPanel(wrapper) {
            const container = wrapper.searchContainerRef;
            if (!container) return;

            const queries = wrapper.searchData?.queries || [];
            const sources = wrapper.searchData?.sources || [];
            const hasSearchData = queries.length > 0 || sources.length > 0;

            if (!hasSearchData) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');

            const displayCount = sources.length || queries.length;
            const arrow = wrapper.searchExpanded ? '▾' : '▸';
            wrapper.searchToggleRef.textContent = `已搜索 ${displayCount} 个来源 ${arrow}`;

            wrapper.searchQueryRef.textContent = queries.length
                ? `搜索: ${queries.map(q => `"${q}"`).join('、')}`
                : '已执行联网搜索';

            wrapper.searchLinksRef.innerHTML = '';
            if (sources.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'search-empty';
                empty.textContent = '暂未收到可展示来源。';
                wrapper.searchLinksRef.appendChild(empty);
            } else {
                sources.forEach(source => {
                    const row = document.createElement('div');
                    if (source.url) {
                        const link = document.createElement('a');
                        link.className = 'search-source-link';
                        link.href = source.url;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        link.textContent = source.title || source.url;
                        row.appendChild(link);
                    } else {
                        row.textContent = source.title;
                    }
                    wrapper.searchLinksRef.appendChild(row);
                });
            }

            if (wrapper.searchExpanded) {
                wrapper.searchDetailsRef.classList.remove('hidden');
            } else {
                wrapper.searchDetailsRef.classList.add('hidden');
            }
        }

        function appendMessageToDOM(role, content, isFinished = false, modelDisplayName = null) {
            const resolvedModelDisplayName = (modelDisplayName || getModelDisplayName(currentSelectedModel)).trim() || 'Assistant';
            const { wrapper, bubble } = createMessageElement(role, resolvedModelDisplayName);

            if (role === 'user') {
                bubble.textContent = content;
            } else {
                const searchContainer = document.createElement('div');
                searchContainer.className = 'search-sources hidden';

                const searchToggle = document.createElement('button');
                searchToggle.className = 'search-toggle';
                searchToggle.type = 'button';
                searchToggle.textContent = '已搜索 0 个来源 ▸';

                const searchDetails = document.createElement('div');
                searchDetails.className = 'search-details hidden';

                const searchQuery = document.createElement('div');
                searchQuery.className = 'search-query';
                searchDetails.appendChild(searchQuery);

                const searchLinks = document.createElement('div');
                searchLinks.className = 'search-links';
                searchDetails.appendChild(searchLinks);

                searchContainer.appendChild(searchToggle);
                searchContainer.appendChild(searchDetails);
                bubble.appendChild(searchContainer);

                const resolvedModelDisplayName = (modelDisplayName || getModelDisplayName(currentSelectedModel)).trim() || 'Assistant';
                const thinkingContainer = document.createElement('div');
                thinkingContainer.className = 'thinking-sources hidden';

                const thinkingToggle = document.createElement('button');
                thinkingToggle.className = 'thinking-toggle';
                thinkingToggle.type = 'button';
                thinkingToggle.textContent = `${resolvedModelDisplayName}'s thinking: ▸`;

                const thinkingDetails = document.createElement('div');
                thinkingDetails.className = 'thinking-details hidden';

                const thinkingMarkdown = document.createElement('div');
                thinkingMarkdown.className = 'markdown-body thinking-markdown text-claudeText dark:text-darkText';
                thinkingDetails.appendChild(thinkingMarkdown);

                thinkingContainer.appendChild(thinkingToggle);
                thinkingContainer.appendChild(thinkingDetails);
                bubble.appendChild(thinkingContainer);

                const mdDiv = document.createElement('div');
                mdDiv.className = 'markdown-body text-claudeText dark:text-darkText';
                bubble.appendChild(mdDiv);

                if (content === '') {
                    mdDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
                } else {
                    setSafeMarkdown(mdDiv, content);
                    if (isFinished) {
                        mdDiv.querySelectorAll('pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });
                        addCodeBlockCopyButtons(mdDiv);
                    }
                }

                wrapper.bubbleRef = bubble;
                wrapper.mdDivRef = mdDiv;
                wrapper.searchContainerRef = searchContainer;
                wrapper.searchToggleRef = searchToggle;
                wrapper.searchDetailsRef = searchDetails;
                wrapper.searchQueryRef = searchQuery;
                wrapper.searchLinksRef = searchLinks;
                wrapper.searchExpanded = false;
                wrapper.searchData = { queries: [], sources: [] };

                wrapper.thinkingContainerRef = thinkingContainer;
                wrapper.thinkingToggleRef = thinkingToggle;
                wrapper.thinkingDetailsRef = thinkingDetails;
                wrapper.thinkingMarkdownRef = thinkingMarkdown;
                wrapper.thinkingExpanded = false;
                wrapper.thinkingText = '';
                wrapper.thinkingModelDisplayName = resolvedModelDisplayName;

                searchToggle.addEventListener('click', () => {
                    wrapper.searchExpanded = !wrapper.searchExpanded;
                    updateSearchPanel(wrapper);
                });

                thinkingToggle.addEventListener('click', () => {
                    wrapper.thinkingExpanded = !wrapper.thinkingExpanded;
                    updateThinkingPanel(wrapper);
                });
            }

            DOM.chatContainer.appendChild(wrapper);
            return wrapper;
        }

        function updateThinkingPanel(wrapper) {
            const container = wrapper.thinkingContainerRef;
            if (!container) return;

            const rawText = String(wrapper.thinkingText || '');
            const hasThinking = rawText.trim().length > 0;
            if (!hasThinking) {
                container.classList.add('hidden');
                wrapper.thinkingDetailsRef.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');
            const arrow = wrapper.thinkingExpanded ? '▾' : '▸';
            const modelName = (wrapper.thinkingModelDisplayName || 'Assistant').trim() || 'Assistant';
            wrapper.thinkingToggleRef.textContent = `${modelName}'s thinking: ${arrow}`;

            if (wrapper.thinkingExpanded) {
                wrapper.thinkingDetailsRef.classList.remove('hidden');
                setSafeMarkdown(wrapper.thinkingMarkdownRef, rawText);
            } else {
                wrapper.thinkingDetailsRef.classList.add('hidden');
            }
        }

        function updateAIMessageDOM(wrapper, content, isFinished) {
            if (isFinished && wrapper.starIconRef) {
                wrapper.starIconRef.classList.remove('star-generating');
            }
            const mdDiv = wrapper.mdDivRef;
            if (!content && !isFinished) {
                mdDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
                return;
            }

            setSafeMarkdown(mdDiv, content);
            if (isFinished) {
                mdDiv.querySelectorAll('pre code').forEach((block) => {
                    if (!block.dataset.highlighted) hljs.highlightElement(block);
                });
                addCodeBlockCopyButtons(mdDiv);
            }
            if (DOM.chatContainer.scrollHeight - DOM.chatContainer.scrollTop < DOM.chatContainer.clientHeight + 100) {
                scrollToBottom();
            }
        }

        async function handleSend() {
            if (STATE.isGenerating) return;
            const text = DOM.chatInput.value.trim();
            if (!text) return;

            let chat = STATE.chats.find(c => c.id === STATE.currentChatId);
            const isNewChat = !chat;

            if (isNewChat) {
                chat = {
                    id: STATE.currentChatId,
                    title: text.length > 12 ? text.substring(0, 12) + '...' : text,
                    messages: [],
                    conversationId: null
                };
                STATE.chats.push(chat);
                DOM.headerTitle.textContent = chat.title;
                DOM.headerTitle.classList.remove('opacity-0');
            }

            DOM.chatInput.value = '';
            autoResizeInput();
            DOM.welcomeScreen.classList.add('hidden');

            chat.messages.push({ role: 'user', content: text });
            appendMessageToDOM('user', text, true);
            saveChats();
            renderChatList();
            scrollToBottom();

            const selectedModel = currentSelectedModel;
            const selectedModelDisplayName = getModelDisplayName(currentSelectedModel);

            const aiWrapper = appendMessageToDOM('assistant', '', false, selectedModelDisplayName);
            const searchState = { queries: [], sources: [] };
            let thinkingText = '';
            scrollToBottom();

            STATE.isGenerating = true;
            DOM.sendBtn.disabled = true;
            DOM.chatInput.disabled = true;

            try {
                STATE.controller = new AbortController();
                const response = await fetch(`${STATE.baseUrl}/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${STATE.apiKey}`,
                        'X-Client-Type': 'Web'
                    },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: chat.messages,
                        conversation_id: chat.conversationId || null,
                        stream: true
                    }),
                    signal: STATE.controller.signal
                });

                const memoryStatus = (response.headers.get('X-Memory-Status') || '').toLowerCase();
                if (memoryStatus === 'degraded') {
                    notifyMemoryDegradedOnce();
                }
                const backendConversationId = (response.headers.get('X-Conversation-Id') || '').trim();
                if (backendConversationId && chat.conversationId !== backendConversationId) {
                    chat.conversationId = backendConversationId;
                    saveChats();
                }

                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error("API KEY doesn't match.");
                    }
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullAiReply = '';
                let sseBuffer = '';

                const consumePayload = (payload) => {
                    if (!payload || payload === '[DONE]') return;

                    let dataObj;
                    try {
                        dataObj = JSON.parse(payload);
                    } catch (e) {
                        return;
                    }

                    if (dataObj?.type === 'search_metadata') {
                        mergeSearchState(searchState, dataObj.searches || {});
                        aiWrapper.searchData = searchState;
                        updateSearchPanel(aiWrapper);
                        return;
                    }

                    if (dataObj?.type === 'thinking_chunk') {
                        const chunk = typeof dataObj.text === 'string' ? dataObj.text : '';
                        if (chunk) {
                            thinkingText += chunk;
                            aiWrapper.thinkingText = thinkingText;
                            updateThinkingPanel(aiWrapper);
                        }
                        return;
                    }

                    const deltaReasoning = dataObj?.choices?.[0]?.delta?.reasoning_content || '';
                    if (deltaReasoning) {
                        thinkingText += deltaReasoning;
                        aiWrapper.thinkingText = thinkingText;
                        updateThinkingPanel(aiWrapper);
                    }

                    const deltaContent = dataObj?.choices?.[0]?.delta?.content || '';
                    if (deltaContent) {
                        fullAiReply += deltaContent;
                        updateAIMessageDOM(aiWrapper, fullAiReply, false);
                    }
                };

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    sseBuffer += decoder.decode(value, { stream: true });
                    const events = sseBuffer.split('\n\n');
                    sseBuffer = events.pop() || '';

                    for (const eventBlock of events) {
                        const lines = eventBlock.split('\n');
                        for (let line of lines) {
                            line = line.trim();
                            if (!line.startsWith('data:')) continue;
                            consumePayload(line.slice(5).trim());
                        }
                    }
                }

                if (sseBuffer.trim().startsWith('data:')) {
                    consumePayload(sseBuffer.trim().slice(5).trim());
                }

                aiWrapper.searchData = searchState;
                updateSearchPanel(aiWrapper);
                aiWrapper.thinkingText = thinkingText;
                updateThinkingPanel(aiWrapper);
                updateAIMessageDOM(aiWrapper, fullAiReply, true);

                chat.messages.push({ role: 'assistant', content: fullAiReply });
                saveChats();

            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('API Error:', err);
                    updateAIMessageDOM(aiWrapper, `**Error:** Failed to connect to backend.

${err.message}`, true);
                }
            } finally {
                STATE.isGenerating = false;
                DOM.sendBtn.disabled = false;
                DOM.chatInput.disabled = false;
                DOM.chatInput.focus();
                STATE.controller = null;
            }
        }

        // --- Dynamic Welcome Message ---
        function updateWelcomeGreeting() {
            const greetingEl = document.getElementById('welcomeGreeting');
            if (!greetingEl) return;

            // Get current time in China Standard Time (UTC+8)
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const cstDate = new Date(utc + (3600000 * 8));
            const hour = cstDate.getHours();
            const minute = cstDate.getMinutes();
            const timeStr = hour + minute / 60;

            let greeting = "Golden hour thinking";
            if (timeStr >= 5 && timeStr < 9) {
                greeting = "Early bird thinking";
            } else if (timeStr >= 9 && timeStr < 11.5) {
                greeting = "Morning clarity";
            } else if (timeStr >= 11.5 && timeStr < 13.5) {
                greeting = "Midday focus";
            } else if (timeStr >= 13.5 && timeStr < 17) {
                greeting = "Afternoon momentum";
            } else if (timeStr >= 17 && timeStr < 19) {
                greeting = "Golden hour thinking";
            } else if (timeStr >= 19 && timeStr < 22) {
                greeting = "Evening deep work";
            } else if (timeStr >= 22 || timeStr < 1) {
                greeting = "Night owl mode";
            } else if (timeStr >= 1 && timeStr < 5) {
                greeting = "Late night thinking";
            }

            greetingEl.textContent = greeting;
        }

        setInterval(updateWelcomeGreeting, 60000);

        // --- Run App ---
        window.addEventListener('DOMContentLoaded', init);
    </script>
