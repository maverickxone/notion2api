<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude - Notion Opus Wrapper</title>

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Google Fonts: Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Light mode signature flesh/cream tones
                        claudeBg: '#fcfbf8',
                        claudeSidebar: '#f6f4f0',
                        claudeText: '#2d2d2d',
                        claudeInput: '#ffffff',
                        claudeUserMsg: '#f2f0eb',

                        // Dark mode overrides
                        darkBg: '#1e1e1e',
                        darkSidebar: '#252525',
                        darkText: '#e5e5e5',
                        darkInput: '#2d2d2d',
                        darkUserMsg: '#383838',

                        // Action colors
                        accent: '#da7756',
                        accentHover: '#c56546',
                    },
                    fontFamily: {
                        sans: ['"Lora"', 'Georgia', 'serif'],
                        serif: ['"Lora"', 'Georgia', 'serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', '"Liberation Mono"', '"Courier New"', 'monospace']
                    }
                }
            }
        }
    </script>

    <!-- Modular CSS Files -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/markdown.css">
</head>

<body class="bg-claudeBg text-claudeText dark:bg-darkBg dark:text-darkText h-screen flex overflow-hidden font-sans">

    <!-- Backdrop for mobile sidebar -->
    <div id="mobileBackdrop" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden transition-opacity"></div>

    <!-- LEFT SIDEBAR -->
    <aside id="sidebar"
        class="bg-claudeSidebar dark:bg-darkSidebar w-[260px] h-full flex flex-col border-r border-black/5 dark:border-white/5 absolute md:relative z-30 transition-transform duration-300 -translate-x-full md:translate-x-0">
        <!-- Sidebar Header / Mobile Close -->
        <div class="p-4 flex items-center justify-between mt-2">
            <h1 class="text-xl font-serif font-medium flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="24" height="24"
                    class="text-accent star-breathe" style="fill: currentColor;">
                    <path
                        d="m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l1.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l1.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l1.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9.4-7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2.2.2-3 1-1 8-5.5Z" />
                </svg>
                Claude
            </h1>
            <button id="closeSidebarBtn"
                class="md:hidden p-2 text-gray-500 hover:text-black dark:item-gray-400 dark:hover:text-white rounded-md">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- New Chat Button -->
        <div class="px-3 pb-4">
            <button id="newChatBtn"
                class="w-full flex items-center gap-2 p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg transition-colors text-sm font-medium">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New chat
            </button>
        </div>

        <!-- Chat History List -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-3 flex flex-col gap-1 pb-4" id="chatList">
            <!-- Chat items injected here dynamically -->
        </div>

        <!-- Sidebar Footer Action (Settings only) -->
        <div class="p-4 border-t border-black/5 dark:border-white/5 flex flex-col gap-3">
            <button id="settingsBtn"
                class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white py-1.5 px-1 rounded-md hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                API Settings
            </button>
        </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <main class="flex-1 flex flex-col relative w-full">
        <!-- Main Area Header -->
        <header
            class="h-14 flex items-center justify-between px-4 sticky top-0 bg-claudeBg/80 dark:bg-darkBg/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <button id="openSidebarBtn"
                    class="md:hidden p-2 -ml-2 text-gray-500 hover:text-black dark:text-gray-400 dark:hover:text-white rounded-md">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div id="headerTitle"
                    class="font-medium text-[15px] truncate max-w-[200px] sm:max-w-xs md:max-w-md hidden md:block opacity-0 transition-opacity">
                    New chat</div>
            </div>

            <button id="themeToggleBtn"
                class="p-2 text-gray-500 hover:text-black dark:text-gray-400 dark:hover:text-white rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                <svg id="sunIcon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
                <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                    </path>
                </svg>
            </button>
        </header>

        <!-- Memory Banner -->
        <div id="memoryBanner" class="hidden px-4 sm:px-6 pt-2 relative z-20">
            <div class="memory-banner max-w-2xl mx-auto rounded-xl px-4 py-3 text-sm flex items-start gap-3">
                <span class="memory-banner-icon text-base leading-5">⚠️</span>
                <div class="flex-1 leading-6">Current context memory is limited. Some history may not be accessible. If the issue persists, please contact the administrator.</div>
                <button id="memoryBannerClose" type="button" class="memory-banner-close text-lg leading-5">✕</button>
            </div>
        </div>

        <!-- Chat Stream Render Area -->
        <div id="chatContainer"
            class="flex-1 overflow-y-auto w-full max-w-2xl mx-auto px-4 sm:px-6 pb-36 pt-4 flex flex-col gap-6 relative z-10 scroll-smooth">
            <!-- Messages inserted here dynamically -->
        </div>

        <!-- Sticky Input Area -->
        <div id="inputAreaWrapper"
            class="absolute left-0 right-0 p-4 sm:px-6 z-20 pointer-events-none chat-state-container">
            <div id="inputGradientMask"
                class="absolute inset-x-0 -top-10 h-10 bg-gradient-to-t from-claudeBg dark:from-darkBg to-transparent z-[-1]">
            </div>
            <div id="inputBgMask" class="absolute inset-0 bg-claudeBg dark:bg-darkBg z-[-1]"></div>

            <div class="max-w-2xl w-full mx-auto pointer-events-none flex flex-col items-center">
                <!-- Initial Welcome Page -->
                <div id="welcomeScreen"
                    class="flex flex-col items-center justify-center pb-8 transition-all duration-300 w-full">
                    <h2
                        class="text-center text-claudeText dark:text-darkText w-full leading-tight flex flex-row items-center justify-center gap-4 welcome-title">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="42" height="42"
                            class="text-accent star-breathe" style="fill: currentColor;">
                            <path
                                d="m19.6 66.5 19.7-11 .3-1-.3-.5h-1l-3.3-.2-11.2-.3L14 53l-9.5-.5-2.4-.5L0 49l1.2-1.5 2-1.3 2.9.2 6.3.5 9.5.6 6.9.4L38 49.1h1.6l.2-.7-.5-.4-.4-.4L29 41l-10.6-7-5.6-4.1-3-2-1.5-2-.6-4.2 2.7-3 3.7.3.9.2 3.7 2.9 8 6.1L37 36l1.5 1.2.6-.4.1-.3-.7-1.1L33 25l-6-10.4-2.7-4.3-.7-2.6c-.3-1-.4-2-.4-3l3-4.2L28 0l4.2.6L33.8 2l2.6 6 4.1 9.3L47 29.9l2 3.8 1 3.4.3 1h.7v-.5l1.5-7.2 1-8.7 1-11.2.3-3.2 1.6-3.8 3-2L61 2.6l2 2.9-.3 1.8-1.1 7.7L59 27.1l-1.5 8.2h.9l1-1.1 4.1-5.4 6.9-8.6 3-3.5L77 13l2.3-1.8h4.3l3.1 4.7-1.4 4.9-4.4 5.6-3.7 4.7-5.3 7.1-3.2 5.7.3.4h.7l12-2.6 6.4-1.1 7.6-1.3 3.5 1.6.4 1.6-1.4 3.4-8.2 2-9.6 2-14.3 3.3-.2.1.2.3 6.4.6 2.8.2h6.8l12.6 1 3.3 2 1.9 2.7-.3 2-5.1 2.6-6.8-1.6-16-3.8-5.4-1.3h-.8v.4l4.6 4.5 8.3 7.5L89 80.1l1.5 2.4-1.3 2-1.4-.2-9.2-7-3.6-3-8-6.8h-.5v.7l1.8 2.7 9.8 14.7.5 4.5-.7 1.4-2.6 1-2.7-.6-5.8-8-6-9.4-7-8.2-.5.4-2.9 30.2-1.3 1.5-3 1.2-2.5-2-1.4-3 1.4-6.2 1.6-8 1.3-6.4 1.2-7.9.7-2.6v-.2H49L43 72l-9 12.3-7.2 7.6-1.7.7-3-1.5.3-2.8L24 86l10-12.8 6-7.9 4-4.6-.1-.5h-.3L17.2 77.4l-4.7.6-2.2.2-3 1-1 8-5.5Z" />
                        </svg>
                        <span id="welcomeGreeting">Golden hour thinking</span>
                    </h2>
                </div>

                <div
                    class="relative bg-white dark:bg-darkInput w-full shadow-[0_0_15px_rgba(0,0,0,0.05)] dark:shadow-none rounded-2xl chat-input-wrapper flex flex-col pointer-events-auto">
                    <div class="relative w-full">
                        <textarea id="chatInput" rows="1" placeholder="Reply..."
                            class="w-full bg-transparent resize-none outline-none max-h-40 min-h-[56px] py-4 pl-4 pr-[50px] text-[15px] placeholder:text-gray-400 dark:placeholder:text-gray-500 overflow-y-auto disabled:opacity-50"
                            style="height: 56px;"></textarea>

                        <button id="sendBtn" title="Send (Enter)"
                            class="absolute right-3 bottom-[14px] bg-accent/10 text-accent hover:bg-accent hover:text-white p-1.5 rounded-lg transition-colors disabled:opacity-40 disabled:hover:bg-accent/10 disabled:hover:text-accent disabled:cursor-not-allowed">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>

                    <div class="flex justify-between items-center px-3 pb-3">
                        <div></div>
                        <div class="relative model-selector-container dropdown-down">
                            <button id="modelTriggerBtn" type="button"
                                class="flex items-center gap-1.5 text-[13px] border border-black/10 dark:border-white/10 dark:bg-white/5 dark:text-white/75 bg-black/5 text-black/75 px-2.5 py-1.5 rounded-lg hover:bg-black/10 dark:hover:bg-white/10 transition-colors">
                                <span id="modelTriggerText">Sonnet 4.6</span>
                                <span class="text-[10px] mt-0.5">∨</span>
                            </button>

                            <div id="customModelDropdown"
                                class="model-dropdown absolute right-0 min-w-max w-[auto] bg-white dark:bg-[#2a2825] border border-black/10 dark:border-white/10 rounded-xl p-1.5 z-50 overflow-hidden flex flex-col shadow-lg">
                                <div id="simpleModelList" class="flex flex-col w-full gap-0.5">
                                    <!-- Dynamic options injected here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-2 text-xs text-gray-400 dark:text-gray-500">
                    Shift + Enter for new line. Powered by local Notion API.
                </div>
            </div>
        </div>
    </main>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal"
        class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white dark:bg-[#2a2a2a] w-full max-w-md rounded-xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200"
            id="settingsModalContent">
            <div class="p-6">
                <h3 class="text-xl font-serif font-medium mb-4">API Settings</h3>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Base URL</label>
                        <input type="text" id="baseUrlInput"
                            class="w-full bg-gray-50 dark:bg-[#1f1f1f] border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-accent/50 outline-none transition-shadow"
                            placeholder="http://localhost:8000">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">API Key</label>
                        <input type="password" id="apiKeyInput"
                            class="w-full bg-gray-50 dark:bg-[#1f1f1f] border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-accent/50 outline-none transition-shadow"
                            placeholder="Optional if not set on server">
                    </div>
                </div>

                <div class="mt-8 flex justify-end gap-3">
                    <button id="cancelSettingsBtn"
                        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Cancel</button>
                    <button id="saveSettingsBtn"
                        class="px-4 py-2 rounded-lg text-sm font-medium bg-black text-white dark:bg-white dark:text-black hover:opacity-90 transition-opacity">Save
                        changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- RENAME MODAL -->
    <div id="renameModal"
        class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white dark:bg-[#2a2a2a] w-full max-w-sm rounded-xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-200"
            id="renameModalContent">
            <div class="p-5">
                <h3 class="text-lg font-serif font-medium mb-3">Rename chat</h3>
                <input type="text" id="renameModalInput"
                    class="w-full bg-transparent border border-black/10 dark:border-white/10 rounded-lg px-3 py-2 text-sm focus:border-black/30 dark:focus:border-white/30 outline-none transition-colors"
                    placeholder="Enter chat title">
                <div class="mt-5 flex justify-end gap-2">
                    <button id="cancelRenameBtn"
                        class="px-4 py-1.5 rounded-lg text-sm font-medium border border-gray-200 dark:border-white/10 hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Cancel</button>
                    <button id="saveRenameBtn"
                        class="px-4 py-1.5 rounded-lg text-sm font-medium bg-black text-white dark:bg-white dark:text-black hover:opacity-90 transition-opacity">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modular JavaScript Files (Load Order Critical) -->
    <!-- Utils -->
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/markdown.js"></script>
    <script src="js/utils/dom.js"></script>

    <!-- Core -->
    <script src="js/core/constants.js"></script>
    <script src="js/core/state.js"></script>

    <!-- API -->
    <script src="js/api/client.js"></script>
    <script src="js/api/models.js"></script>
    <script src="js/api/settings.js"></script>

    <!-- Chat -->
    <script src="js/chat/storage.js"></script>
    <script src="js/chat/renderer.js"></script>
    <script src="js/chat/streaming.js"></script>
    <script src="js/chat/manager.js"></script>

    <!-- UI -->
    <script src="js/ui/theme.js"></script>
    <script src="js/ui/sidebar.js"></script>
    <script src="js/ui/modal.js"></script>
    <script src="js/ui/input.js"></script>

    <!-- Application Entry Point -->
    <script src="js/core/app.js"></script>
</body>

</html>
